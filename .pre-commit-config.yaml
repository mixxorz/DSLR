repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.7"
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Run the formatter.
      - id: ruff-format
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run --group dev pyright
        language: system
        types: [python]
        pass_filenames: false
