[tox]
isolated_build = True
envlist =
    py310-psycopg2
    py310-psycopg3
    py311-psycopg2
    py311-psycopg3
    py312-psycopg2
    py312-psycopg3
    py313-psycopg2
    py313-psycopg3
    py314-psycopg2
    py314-psycopg3

[gh-actions]
python =
    3.10: py310-psycopg2, py310-psycopg3
    3.11: py311-psycopg2, py311-psycopg3
    3.12: py312-psycopg2, py312-psycopg3
    3.13: py313-psycopg2, py313-psycopg3
    3.14: py314-psycopg2, py314-psycopg3

[testenv]
commands =
    python -m unittest

[testenv:{py310,py311,py312,py313,py314}-psycopg2]
deps = psycopg2-binary

[testenv:{py310,py311,py312,py313,py314}-psycopg3]
deps = psycopg
